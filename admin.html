<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>管理员看板 — 学术论文AI一站式助手</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'PingFang SC',sans-serif;background:#f5f5fa;color:#1d1d1f;padding:24px 32px;min-height:100vh}
.sidebar{position:fixed;left:0;top:0;bottom:0;width:220px;background:#fff;border-right:1px solid rgba(0,0,0,.06);padding:20px 16px;display:flex;flex-direction:column;gap:4px}
.sidebar h2{font-size:.85rem;font-weight:700;padding:8px 12px 16px;color:#1d1d1f}
.sidebar a{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:8px;font-size:.78rem;color:#515154;text-decoration:none;cursor:pointer;transition:all .15s}
.sidebar a:hover,.sidebar a.active{background:rgba(99,102,241,.08);color:#6366f1;font-weight:600}
.main-content{margin-left:244px}
h1{font-size:1.2rem;font-weight:700;margin-bottom:4px}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:14px;margin:16px 0 24px}
.stat{background:#fff;border-radius:14px;padding:20px 18px;border:1.5px solid rgba(0,0,0,.06);position:relative;overflow:hidden;transition:all .2s}
.stat:hover{box-shadow:0 4px 16px rgba(0,0,0,.06);transform:translateY(-2px)}
.stat::before{content:"";position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,#6366f1,#a78bfa)}
.stat .v{font-size:1.8rem;font-weight:800;color:#1d1d1f;position:relative;z-index:1}
.stat .l{font-size:.68rem;color:#86868b;margin-top:4px;position:relative;z-index:1;font-weight:500}
h2{font-size:.95rem;margin:24px 0 12px;color:#1d1d1f;font-weight:700}
table{width:100%;border-collapse:collapse;font-size:.74rem;background:#fff;border-radius:12px;overflow:hidden;border:1px solid rgba(0,0,0,.06)}
th{text-align:left;padding:10px 14px;color:#86868b;font-weight:600;border-bottom:1px solid rgba(0,0,0,.06);font-size:.65rem;background:rgba(0,0,0,.02)}
td{padding:10px 14px;border-bottom:1px solid rgba(0,0,0,.03);color:#3a3a3c}
tr:last-child td{border-bottom:none}
.btn{padding:7px 16px;border:none;border-radius:8px;cursor:pointer;font-size:.72rem;font-weight:600;transition:all .15s}
.btn:hover{transform:translateY(-1px)}
.btn-primary{background:#6366f1;color:#fff}.btn-primary:hover{background:#4f46e5}
.btn-danger{background:rgba(239,68,68,.1);color:#ef4444}.btn-danger:hover{background:rgba(239,68,68,.15)}
.btn-green{background:rgba(16,185,129,.1);color:#059669}.btn-green:hover{background:rgba(16,185,129,.15)}
input,select{background:#fff;border:1.5px solid rgba(0,0,0,.08);border-radius:8px;padding:9px 14px;color:#1d1d1f;font-size:.74rem;outline:none;transition:border-color .15s}
input:focus{border-color:#6366f1;box-shadow:0 0 0 3px rgba(99,102,241,.08)}
.login-box{max-width:420px;margin:80px auto;background:#fff;border-radius:18px;padding:40px 36px;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,.08);border:1px solid rgba(0,0,0,.06)}
.flex{display:flex;gap:8px;align-items:center}
.gap8{display:flex;gap:8px;flex-wrap:wrap}
</style></head><body>
<div id="loginBox" class="login-box">
  <h1 style="margin-bottom:16px">🔐 管理员登录</h1>
  <input id="loginUser" type="text" placeholder="用户名" style="width:100%;margin-bottom:8px"><br>
  <input id="loginPass" type="password" placeholder="密码" style="width:100%;margin-bottom:8px"><br>
  <div style="font-size:.62rem;color:#94a3b8;margin:4px 0 8px">— 或者输入管理密钥 —</div>
  <input id="secretInput" type="password" placeholder="管理密钥（免密码）" style="width:100%;margin-bottom:10px"><br>
  <button class="btn btn-primary" onclick="login()" style="width:100%;margin-bottom:6px">账号登录</button>
  <button class="btn" onclick="loginWithSecret()" style="width:100%;background:rgba(0,0,0,.04);color:#86868b;font-size:.7rem">使用密钥登录</button>
  <p style="font-size:.6rem;color:#94a3b8;margin-top:10px">管理员账号: admin / admin123<br>密钥: 首次启动时自动生成，查看服务器日志中的 ADMIN_SECRET</p>
</div>

<div id="dashboard" style="display:none"><div class="sidebar"><h2>📊 管理看板</h2><a class="active" onclick="loadDashboard()">📈 数据概览</a><a onclick="document.getElementById('userSection').scrollIntoView({behavior:'smooth'})">👥 用户管理</a><a onclick="document.getElementById('orderSection').scrollIntoView({behavior:'smooth'})">💰 充值订单</a></div><div class="main-content">
  <div class="flex" style="justify-content:space-between;margin-bottom:16px">
    <h1>📊 管理员看板</h1>
    <button class="btn btn-danger" onclick="logout()">退出</button>
  </div>

  <div class="stats" id="statCards"></div>

  <h2>👥 用户管理</h2>
  <div class="gap8" style="margin-bottom:12px">
    <input id="uidInput" type="number" placeholder="用户ID" style="width:80px">
    <input id="creditAmount" type="number" placeholder="点数(正=加/负=扣)" style="width:150px">
    <input id="creditReason" placeholder="原因" style="width:200px">
    <button class="btn btn-primary" onclick="adjustCredits()">调整点数</button>
  </div>
  <table id="userTable"><thead><tr><th>ID</th><th>用户名</th><th>点数</th><th>邀请码</th><th>注册时间</th></tr></thead><tbody></tbody></table>

  <h2>💰 充值订单</h2>
  <table id="orderTable"><thead><tr><th>ID</th><th>用户</th><th>金额</th><th>状态</th><th>时间</th><th>操作</th></tr></thead><tbody></tbody></table>
</div>

<script>
var SECRET = '';
function login(){var u=document.getElementById('loginUser').value;var p=document.getElementById('loginPass').value;if(!u||!p){alert('请输入用户名和密码');return}fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})}).then(r=>r.json()).then(d=>{if(d.success){SECRET=d.token;loadDashboard();}else{alert(d.error)}}).catch(function(){alert('网络错误');});}
function loginWithSecret(){SECRET=document.getElementById('secretInput').value;if(!SECRET){alert('请输入密钥');return}loadDashboard();}
function logout(){SECRET='';document.getElementById('loginBox').style.display='';document.getElementById('dashboard').style.display='none';}
function loadDashboard(){
  if(!SECRET){alert('请先登录');return}
  fetch('/api/admin/dashboard?secret='+encodeURIComponent(SECRET)).then(r=>r.json()).then(d=>{
    if(!d.success){alert(d.error||'无权限');return}
    document.getElementById('loginBox').style.display='none';
    document.getElementById('dashboard').style.display='';
    var s=d.stats;
    document.getElementById('statCards').innerHTML=
      '<div class="stat"><div class="v">'+s.total_users+'</div><div class="l">总用户</div></div>'+
      '<div class="stat"><div class="v">'+s.today_users+'</div><div class="l">今日新增</div></div>'+
      '<div class="stat"><div class="v">'+(s.total_credits/1000).toFixed(1)+'</div><div class="l">总点数</div></div>'+
      '<div class="stat"><div class="v">¥'+s.total_recharge+'</div><div class="l">充值总额</div></div>'+
      '<div class="stat"><div class="v">'+s.pending_orders+'</div><div class="l">待确认订单</div></div>'+
      '<div class="stat"><div class="v">'+s.llm_today+'</div><div class="l">今日AI调用</div></div>'+
      '<div class="stat"><div class="v">'+s.llm_total+'</div><div class="l">累计AI调用</div></div>'+
      '<div class="stat"><div class="v">'+s.total_cost+'</div><div class="l">AI消耗点数</div></div>';

    var uhtml='';
    s.recent_users.forEach(function(u){uhtml+='<tr><td>'+u.id+'</td><td>'+u.username+'</td><td>'+(u.credits/1000).toFixed(2)+'</td><td>'+(u.invite_code||'-')+'</td><td>'+(u.created_at||'').substring(0,16)+'</td></tr>';});
    document.querySelector('#userTable tbody').innerHTML=uhtml;

    var ohtml='';var sm={pending:'待支付',submitted:'已提交',confirmed:'已到账'};
    s.recent_orders.forEach(function(o){ohtml+='<tr><td>'+o.id+'</td><td>'+o.username+'</td><td>¥'+o.amount_yuan+'</td><td>'+sm[o.status]+'</td><td>'+(o.created_at||'').substring(0,16)+'</td><td>'+(o.status==='submitted'?'<button class=\"btn btn-green\" onclick=\"confirmOrder('+o.id+')\">确认到账</button>':'')+'</td></tr>';});
    document.querySelector('#orderTable tbody').innerHTML=ohtml;
  }).catch(function(){alert('网络错误')});
}
function adjustCredits(){
  var uid=parseInt(document.getElementById('uidInput').value);
  var amt=parseInt(document.getElementById('creditAmount').value);
  var reason=document.getElementById('creditReason').value||'管理员调整';
  if(!uid||!amt){alert('请输入用户ID和点数');return}
  fetch('/api/admin/credits',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({secret:SECRET,user_id:uid,amount:amt,reason:reason})})
    .then(r=>r.json()).then(d=>{if(d.success){alert('调整成功，余额:'+(d.credits/1000).toFixed(2)+'点');loadDashboard();}else{alert(d.error)}});
}
function confirmOrder(oid){
  fetch('/api/payment/confirm',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({order_id:oid})})
    .then(r=>r.json()).then(d=>{if(d.success)loadDashboard();else alert(d.error);});
}
</script></div></body></html>
