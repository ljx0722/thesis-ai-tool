<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>管理员看板 — 学术论文AI一站式助手</title>
<link rel="stylesheet" href="css/style.css">
<style>
  body { background: var(--bg-app); font-family: var(--font-sans); color: var(--text-primary); padding: 0; min-height: 100vh; overflow: auto; }
  .admin-layout { display: flex; min-height: 100vh; }
  /* Sidebar: dark sidebar style matching main app */
  .admin-sidebar { width: 220px; flex-shrink: 0; background: var(--bg-sidebar); border-right: 1px solid var(--border-sidebar); display: flex; flex-direction: column; gap: 2px; padding: 20px 12px; position: fixed; top: 0; left: 0; bottom: 0; z-index: 10; }
  .admin-sidebar h2 { font-size: var(--font-size-lg); font-weight: var(--font-weight-bold); padding: 8px 12px 16px; color: #f1f5f9; letter-spacing: -0.01em; }
  .admin-sidebar a { display: flex; align-items: center; gap: 8px; padding: 8px 12px; border-radius: var(--radius-sm); font-size: var(--font-size-sm); color: rgba(255,255,255,0.5); text-decoration: none; cursor: pointer; transition: all var(--duration-fast) var(--easing-default); font-weight: var(--font-weight-medium); }
  .admin-sidebar a:hover, .admin-sidebar a.active { background: var(--bg-sidebar-hover); color: #f1f5f9; }
  .admin-sidebar a.active { background: var(--bg-sidebar-active); color: var(--accent-light); font-weight: var(--font-weight-semibold); }
  .admin-sidebar .nav-divider { height: 1px; background: var(--border-sidebar); margin: 8px 0; }
  /* Main content */
  .admin-main { margin-left: 220px; flex: 1; padding: 24px 32px; min-width: 0; }
  .admin-topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  .admin-topbar h1 { font-size: var(--font-size-2xl); font-weight: var(--font-weight-bold); color: var(--text-primary); letter-spacing: -0.02em; margin: 0; }
  /* Stat cards: kpi-console grid */
  .admin-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 28px; }
  .admin-stat { background: var(--bg-card); border-radius: var(--radius-lg); padding: 20px 16px; border: 1px solid var(--border); position: relative; overflow: hidden; transition: all var(--duration-fast) var(--easing-default); box-shadow: var(--shadow-xs); }
  .admin-stat:hover { box-shadow: var(--shadow-sm); transform: translateY(-1px); border-color: var(--border-strong); }
  .admin-stat::before { content: ""; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, var(--accent), var(--accent-light)); }
  .admin-stat .stat-value { font-size: 1.8rem; font-weight: var(--font-weight-heavy); color: var(--text-primary); position: relative; z-index: 1; font-family: var(--font-mono); }
  .admin-stat .stat-label { font-size: var(--font-size-xs); color: var(--text-muted); margin-top: 4px; position: relative; z-index: 1; font-weight: var(--font-weight-medium); text-transform: uppercase; letter-spacing: 0.04em; }
  /* Section headings */
  .admin-section-title { font-size: var(--font-size-lg); margin: 24px 0 12px; color: var(--text-primary); font-weight: var(--font-weight-bold); letter-spacing: -0.01em; }
  /* Tables */
  .admin-table { width: 100%; border-collapse: collapse; font-size: var(--font-size-sm); background: var(--bg-card); border-radius: var(--radius-lg); overflow: hidden; border: 1px solid var(--border); box-shadow: var(--shadow-xs); }
  .admin-table th { text-align: left; padding: 10px 14px; color: var(--text-muted); font-weight: var(--font-weight-semibold); border-bottom: 1px solid var(--border); font-size: var(--font-size-xs); background: var(--surface-alt); text-transform: uppercase; letter-spacing: 0.04em; }
  .admin-table td { padding: 10px 14px; border-bottom: 1px solid var(--border-light); color: var(--text-secondary); }
  .admin-table tr:last-child td { border-bottom: none; }
  .admin-table tr:hover td { background: var(--bg-card-hover); }
  /* Buttons */
  .admin-btn { padding: 7px 16px; border: 1px solid var(--border); border-radius: var(--radius-sm); cursor: pointer; font-size: var(--font-size-sm); font-weight: var(--font-weight-semibold); transition: all var(--duration-fast) var(--easing-default); font-family: var(--font-sans); background: var(--bg-card); color: var(--text-secondary); }
  .admin-btn:hover { transform: translateY(-1px); }
  .admin-btn:active { transform: translateY(0); }
  .admin-btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .admin-btn-primary:hover { background: var(--accent-dark); box-shadow: 0 4px 12px var(--accent-glow); }
  .admin-btn-danger { background: var(--danger-bg); color: var(--danger); border-color: rgba(239,68,68,0.15); }
  .admin-btn-danger:hover { background: rgba(239,68,68,0.12); }
  .admin-btn-success { background: var(--success-bg); color: #059669; border-color: rgba(16,185,129,0.15); }
  .admin-btn-success:hover { background: rgba(16,185,129,0.12); }
  .admin-btn-ghost { background: transparent; border-color: transparent; color: var(--text-muted); }
  .admin-btn-ghost:hover { background: var(--bg-card-hover); color: var(--text-secondary); }
  /* Inputs */
  .admin-input { background: var(--bg-input); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 8px 12px; color: var(--text-primary); font-size: var(--font-size-sm); outline: none; transition: border-color var(--duration-fast) var(--easing-default); font-family: var(--font-sans); }
  .admin-input:focus { border-color: var(--accent); box-shadow: var(--shadow-ring); }
  .admin-input::placeholder { color: var(--text-muted); }
  /* Flex utilities */
  .admin-flex { display: flex; gap: 8px; align-items: center; }
  .admin-flex-wrap { display: flex; gap: 8px; flex-wrap: wrap; }
  .admin-flex-between { display: flex; align-items: center; justify-content: space-between; }
  .admin-gap { gap: 8px; }
  /* Login box */
  .admin-login { max-width: 420px; margin: 80px auto; background: var(--bg-card); border-radius: var(--radius-xl); padding: 40px 36px; text-align: center; box-shadow: var(--shadow-lg); border: 1px solid var(--border); }
  .admin-login h1 { font-size: var(--font-size-2xl); font-weight: var(--font-weight-bold); color: var(--text-primary); margin-bottom: 16px; letter-spacing: -0.02em; }
  .admin-login .divider-text { font-size: var(--font-size-xs); color: var(--text-muted); margin: 8px 0; }
  .admin-login .hint { font-size: var(--font-size-xs); color: var(--text-muted); margin-top: 10px; line-height: 1.6; }
  /* Badge */
  .admin-badge { display: inline-block; padding: 2px 8px; border-radius: var(--radius-full); font-size: var(--font-size-xs); font-weight: var(--font-weight-semibold); }
  .admin-badge-pending { background: var(--warning-bg); color: #b45309; }
  .admin-badge-confirmed { background: var(--success-bg); color: #059669; }
  .admin-badge-submitted { background: var(--info-bg); color: var(--info); }
</style></head><body>
<div class="admin-layout">
  <!-- Login Box -->
  <div id="loginBox" class="admin-login">
    <h1>管理员登录</h1>
    <input id="loginUser" class="admin-input" type="text" placeholder="用户名" style="width:100%;margin-bottom:8px"><br>
    <input id="loginPass" class="admin-input" type="password" placeholder="密码" style="width:100%;margin-bottom:8px"><br>
    <div class="divider-text">— 或者输入管理密钥 —</div>
    <input id="secretInput" class="admin-input" type="password" placeholder="管理密钥（免密码）" style="width:100%;margin-bottom:10px"><br>
    <button class="admin-btn admin-btn-primary" onclick="login()" style="width:100%;margin-bottom:6px">账号登录</button>
    <button class="admin-btn admin-btn-ghost" onclick="loginWithSecret()" style="width:100%;font-size:0.7rem">使用密钥登录</button>
    <p class="hint">管理员账号: admin / admin123<br>密钥: 首次启动时自动生成，查看服务器日志中的 ADMIN_SECRET</p>
  </div>

  <!-- Dashboard (hidden until login) -->
  <div id="dashboard" style="display:none">
    <div class="admin-sidebar">
      <h2>管理看板</h2>
      <a class="active" onclick="loadDashboard()">数据概览</a>
      <a onclick="document.getElementById('userSection').scrollIntoView({behavior:'smooth'})">用户管理</a>
      <a onclick="document.getElementById('orderSection').scrollIntoView({behavior:'smooth'})">充值订单</a>
      <div class="nav-divider"></div>
      <a href="/" style="font-size:0.65rem;color:rgba(255,255,255,0.25)">← 返回主页</a>
    </div>
    <div class="admin-main">
      <div class="admin-topbar">
        <h1>管理员看板</h1>
        <button class="admin-btn admin-btn-danger" onclick="logout()">退出</button>
      </div>

      <div class="admin-stats" id="statCards"></div>

      <div id="userSection">
        <h2 class="admin-section-title">用户管理</h2>
        <div class="admin-flex-wrap" style="margin-bottom:12px">
          <input id="uidInput" class="admin-input" type="number" placeholder="用户ID" style="width:80px">
          <input id="creditAmount" class="admin-input" type="number" placeholder="点数(正=加/负=扣)" style="width:160px">
          <input id="creditReason" class="admin-input" placeholder="原因" style="width:200px">
          <button class="admin-btn admin-btn-primary" onclick="adjustCredits()">调整点数</button>
        </div>
        <table class="admin-table" id="userTable"><thead><tr><th>ID</th><th>用户名</th><th>点数</th><th>邀请码</th><th>注册时间</th></tr></thead><tbody></tbody></table>
      </div>

      <div id="orderSection">
        <h2 class="admin-section-title">充值订单</h2>
        <table class="admin-table" id="orderTable"><thead><tr><th>ID</th><th>用户</th><th>金额</th><th>状态</th><th>时间</th><th>操作</th></tr></thead><tbody></tbody></table>
      </div>
    </div>
  </div>
</div>

<script>
var SECRET = '';
function login(){var u=document.getElementById('loginUser').value;var p=document.getElementById('loginPass').value;if(!u||!p){alert('请输入用户名和密码');return}fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})}).then(r=>r.json()).then(d=>{if(d.success){SECRET=d.token;loadDashboard();}else{alert(d.error)}}).catch(function(){alert('网络错误');});}
function loginWithSecret(){SECRET=document.getElementById('secretInput').value;if(!SECRET){alert('请输入密钥');return}loadDashboard();}
function logout(){SECRET='';document.getElementById('loginBox').style.display='';document.getElementById('dashboard').style.display='none';}
function loadDashboard(){
  if(!SECRET){alert('请先登录');return}
  var headers = {'Authorization': 'Bearer ' + SECRET};
  fetch('/api/admin/dashboard?secret='+encodeURIComponent(SECRET), {headers: headers}).then(r=>r.json()).then(d=>{
    if(!d.success){alert(d.error||'无权限');return}
    document.getElementById('loginBox').style.display='none';
    document.getElementById('dashboard').style.display='block';
    var s=d.stats;
    document.getElementById('statCards').innerHTML=
      '<div class="admin-stat"><div class="stat-value">'+s.total_users+'</div><div class="stat-label">总用户</div></div>'+
      '<div class="admin-stat"><div class="stat-value">'+s.today_users+'</div><div class="stat-label">今日新增</div></div>'+
      '<div class="admin-stat"><div class="stat-value">'+(s.total_credits/1000).toFixed(1)+'</div><div class="stat-label">总点数</div></div>'+
      '<div class="admin-stat"><div class="stat-value">&yen;'+s.total_recharge+'</div><div class="stat-label">充值总额</div></div>'+
      '<div class="admin-stat"><div class="stat-value">'+s.pending_orders+'</div><div class="stat-label">待确认订单</div></div>'+
      '<div class="admin-stat"><div class="stat-value">'+s.llm_today+'</div><div class="stat-label">今日AI调用</div></div>'+
      '<div class="admin-stat"><div class="stat-value">'+s.llm_total+'</div><div class="stat-label">累计AI调用</div></div>'+
      '<div class="admin-stat"><div class="stat-value">'+s.total_cost+'</div><div class="stat-label">AI消耗点数</div></div>';

    var uhtml='';
    s.recent_users.forEach(function(u){uhtml+='<tr><td>'+u.id+'</td><td>'+u.username+'</td><td>'+(u.credits/1000).toFixed(2)+'</td><td>'+(u.invite_code||'-')+'</td><td>'+(u.created_at||'').substring(0,16)+'</td></tr>';});
    document.querySelector('#userTable tbody').innerHTML=uhtml;

    var ohtml='';var sm={pending:'<span class="admin-badge admin-badge-pending">待支付</span>',submitted:'<span class="admin-badge admin-badge-submitted">已提交</span>',confirmed:'<span class="admin-badge admin-badge-confirmed">已到账</span>'};
    s.recent_orders.forEach(function(o){ohtml+='<tr><td>'+o.id+'</td><td>'+o.username+'</td><td>&yen;'+o.amount_yuan+'</td><td>'+(sm[o.status]||o.status)+'</td><td>'+(o.created_at||'').substring(0,16)+'</td><td>'+(o.status==='submitted'?'<button class="admin-btn admin-btn-success" onclick="confirmOrder('+o.id+')">确认到账</button>':'')+'</td></tr>';});
    document.querySelector('#orderTable tbody').innerHTML=ohtml;
  }).catch(function(){alert('网络错误')});
}
function adjustCredits(){
  var uid=parseInt(document.getElementById('uidInput').value);
  var amt=parseInt(document.getElementById('creditAmount').value);
  var reason=document.getElementById('creditReason').value||'管理员调整';
  if(!uid||!amt){alert('请输入用户ID和点数');return}
  fetch('/api/admin/credits',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+SECRET},body:JSON.stringify({secret:SECRET,user_id:uid,amount:amt,reason:reason})}).then(r=>r.json()).then(d=>{if(d.success){alert('调整成功');loadDashboard();}else{alert(d.error)}}).catch(function(){alert('网络错误')});
}
function confirmOrder(oid){
  fetch('/api/payment/confirm',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+SECRET},body:JSON.stringify({secret:SECRET,order_id:oid})}).then(r=>r.json()).then(d=>{if(d.success){alert('已确认');loadDashboard();}else{alert(d.error)}}).catch(function(){alert('网络错误')});
}
</script>
</body></html>
