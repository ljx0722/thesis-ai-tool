name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/ljx0722/thesis-ai-tool:latest
          labels: |
            org.opencontainers.image.source=https://github.com/ljx0722/thesis-ai-tool

  deploy-to-sealos:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: latest

      - name: Deploy to Sealos
        env:
          K8S_CONFIG: ${{ secrets.SEALOS_KUBECONFIG }}
          DS_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          mkdir -p ~/.kube
          echo "$K8S_CONFIG" | base64 -d > ~/.kube/config

          # Update secrets
          kubectl create secret generic thesis-ai-secrets \
            -n ns-mzyybqj8 \
            --from-literal=deepseek-api-key="$DS_KEY" \
            --from-literal=jwt-secret="$DS_KEY" \
            --from-literal=admin-secret="admin123" \
            --dry-run=client -o yaml | kubectl apply -f - || true

          # Create PVC
          echo "apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: thesis-db-pvc
  namespace: ns-mzyybqj8
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi" | kubectl apply -f -

          # Set env vars
          kubectl set env deployment/thesis-ai-tool -n ns-mzyybqj8 \
            DEEPSEEK_API_KEY="$DS_KEY" \
            DB_PATH=/app/data/thesis.db || true

          # Create patch file for volume mount
          cat > /tmp/patch.yaml << 'ENDPATCH'
spec:
  template:
    spec:
      containers:
      - name: thesis-ai-tool
        volumeMounts:
        - name: db-storage
          mountPath: /app/data
      volumes:
      - name: db-storage
        persistentVolumeClaim:
          claimName: thesis-db-pvc
ENDPATCH

          kubectl patch deployment thesis-ai-tool -n ns-mzyybqj8 \
            --type merge \
            --patch-file /tmp/patch.yaml || true

          kubectl rollout restart deployment/thesis-ai-tool -n ns-mzyybqj8
          kubectl rollout status deployment/thesis-ai-tool -n ns-mzyybqj8 --timeout=180s
