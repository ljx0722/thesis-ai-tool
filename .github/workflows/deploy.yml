name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/ljx0722/thesis-ai-tool:latest
          labels: |
            org.opencontainers.image.source=https://github.com/ljx0722/thesis-ai-tool

  deploy-to-sealos:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: latest

      - name: Apply K8s PVC, secrets, volume mount, and restart
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.SEALOS_KUBECONFIG }}" | base64 -d > ~/.kube/config
          kubectl create secret generic thesis-ai-secrets \
            --namespace ns-mzyybqj8 \
            --from-literal=deepseek-api-key="${{ secrets.DEEPSEEK_API_KEY }}" \
            --from-literal=jwt-secret="${{ secrets.DEEPSEEK_API_KEY }}" \
            --from-literal=admin-secret="admin123" \
            --dry-run=client -o yaml | kubectl apply -f -
          kubectl apply -f - <<'K8S'
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: thesis-db-pvc
  namespace: ns-mzyybqj8
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
K8S
          kubectl set env deployment/thesis-ai-tool -n ns-mzyybqj8 \
            DEEPSEEK_API_KEY="${{ secrets.DEEPSEEK_API_KEY }}" \
            DB_PATH=/app/data/thesis.db
          kubectl patch deployment thesis-ai-tool -n ns-mzyybqj8 --type=json -p='[{"op":"replace","path":"/spec/template/spec/containers/0/volumeMounts","value":[{"name":"db-storage","mountPath":"/app/data"}]},{"op":"replace","path":"/spec/template/spec/volumes","value":[{"name":"db-storage","persistentVolumeClaim":{"claimName":"thesis-db-pvc"}}]}]'
          kubectl rollout restart deployment/thesis-ai-tool -n ns-mzyybqj8
          kubectl rollout status deployment/thesis-ai-tool -n ns-mzyybqj8 --timeout=180s
