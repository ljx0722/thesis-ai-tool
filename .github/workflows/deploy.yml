name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/ljx0722/thesis-ai-tool:latest
          labels: org.opencontainers.image.source=https://github.com/ljx0722/thesis-ai-tool

  deploy-to-sealos:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: azure/setup-kubectl@v4
        with:
          version: latest
      - name: Deploy to Sealos
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.SEALOS_KUBECONFIG }}" | base64 -d > ~/.kube/config
          kubectl set env deployment/thesis-ai-tool -n ns-mzyybqj8 DEEPSEEK_API_KEY="${{ secrets.DEEPSEEK_API_KEY }}"
          kubectl set env deployment/thesis-ai-tool -n ns-mzyybqj8 DB_PATH=/app/data/thesis.db
          kubectl rollout restart deployment/thesis-ai-tool -n ns-mzyybqj8
          kubectl rollout status deployment/thesis-ai-tool -n ns-mzyybqj8 --timeout=180s
