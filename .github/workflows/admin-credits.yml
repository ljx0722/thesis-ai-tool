name: Admin Credit Adjustment

on:
  workflow_dispatch:

jobs:
  add-credits:
    runs-on: ubuntu-latest
    steps:
      - uses: azure/setup-kubectl@v4
        with:
          version: latest
      - name: Add 500 decipoints to admin
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.SEALOS_KUBECONFIG }}" | base64 -d > ~/.kube/config
          kubectl exec -n ns-mzyybqj8 deploy/thesis-ai-tool -- sh -c "sqlite3 /app/data/thesis.db \"SELECT 'Before:', credits FROM users WHERE username='admin'; UPDATE users SET credits = credits + 500 WHERE username='admin'; SELECT 'After:', credits FROM users WHERE username='admin';\""
